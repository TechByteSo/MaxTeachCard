name: Verify minified assets

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  minify-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate minified CSS/JS
        run: npm run minify

      - name: Fail if minified files drift from committed versions
        run: |
          git diff --exit-code -- styles/style.min.css styles/slider.min.css scripts/script.min.js
